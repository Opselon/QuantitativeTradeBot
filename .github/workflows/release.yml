name: 📦 Production Release & Artifacts

on:
  push:
    tags:
      - "v*" # Triggered ONLY when pushing a tag like v0.65.0
  workflow_dispatch:
    inputs:
      version:
        description: "نسخه‌ی semantic بدون v (مثلاً 0.64.0)"
        required: true
        default: "0.64.0"
        type: string
      prerelease:
        description: "Release به صورت pre-release منتشر شود؟"
        required: true
        default: false
        type: boolean
      draft:
        description: "Release به صورت draft ایجاد شود؟"
        required: true
        default: false
        type: boolean

permissions:
  contents: write # Required for creating GitHub Releases
  actions: read

env:
  BUILD_CONFIGURATION: Release
  SOLUTION_PATH: NexusTradingEngine.sln
  DESKTOP_PROJECT: src/Nexus.Desktop/Nexus.Desktop.csproj
  INFRASTRUCTURE_PROJECT: src/Nexus.Infrastructure/Nexus.Infrastructure.csproj

jobs:
# =====================================================================
# JOB 1: STRICT BUILD & RELEASE
# =====================================================================
  release-production:
    name: 🚀 Publish & Release (Production)
    runs-on: windows-latest
    environment: production # 🛡️ REQUIRES MANUAL APPROVAL IN GITHUB SETTINGS
    timeout-minutes: 60
    env:
      PUBLISH_ROOT: ${{ github.workspace }}/artifacts/publish
      RELEASE_ROOT: ${{ github.workspace }}/artifacts/release
      MIGRATION_ROOT: ${{ github.workspace }}/artifacts/migrations

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine Version
        id: version
        shell: bash
        run: |
          if [ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "tag=v${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            TAG_NAME=${GITHUB_REF#refs/tags/}
            echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
            echo "version=${TAG_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore Solution
        run: dotnet restore "${{ env.SOLUTION_PATH }}"

      # 🔴 STRICT GATE: Release will FAIL and STOP if tests do not pass here. No bypass.
      - name: Verify All Unit Tests
        run: |
          dotnet test "${{ env.SOLUTION_PATH }}" --configuration Release --no-restore \
          --filter "TestCategory!=Docker&TestCategory!=Integration&TestCategory!=E2E"

      - name: Publish Desktop App
        run: |
          dotnet publish "${{ env.DESKTOP_PROJECT }}" --configuration Release --runtime win-x64 --self-contained true --no-restore --output "${{ env.PUBLISH_ROOT }}/win-x64-self-contained"
          dotnet publish "${{ env.DESKTOP_PROJECT }}" --configuration Release --runtime win-x64 --self-contained false --no-restore --output "${{ env.PUBLISH_ROOT }}/win-x64-framework-dependent"

      - name: Build Native Windows
        shell: bash
        run: |
          if [ -f "native/build.sh" ]; then chmod +x native/build.sh; ./native/build.sh || true; fi

      - name: EF Migration Bundle
        run: |
          dotnet tool install dotnet-ef --global --version "9.0.2"
          New-Item -ItemType Directory -Path "${{ env.MIGRATION_ROOT }}" -Force | Out-Null
          dotnet ef migrations bundle --project "${{ env.INFRASTRUCTURE_PROJECT }}" --startup-project "${{ env.INFRASTRUCTURE_PROJECT }}" --configuration Release --runtime win-x64 --self-contained --force --output "${{ env.MIGRATION_ROOT }}/efbundle.exe" || Write-Warning "EF Bundle failed"

      - name: Create ZIP Packages
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "${{ env.RELEASE_ROOT }}" -Force | Out-Null
          $ver = "${{ steps.version.outputs.version }}"
          Compress-Archive -Path "${{ env.PUBLISH_ROOT }}/win-x64-self-contained/*" -DestinationPath "${{ env.RELEASE_ROOT }}/Nexus-win-x64-self-contained-$ver.zip" -Force
          Compress-Archive -Path "${{ env.PUBLISH_ROOT }}/win-x64-framework-dependent/*" -DestinationPath "${{ env.RELEASE_ROOT }}/Nexus-win-x64-framework-dependent-$ver.zip" -Force
          if (Test-Path "${{ env.MIGRATION_ROOT }}/efbundle.exe") { Copy-Item "${{ env.MIGRATION_ROOT }}/efbundle.exe" "${{ env.RELEASE_ROOT }}/efbundle-win-x64-$ver.exe" -Force }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Nexus Trading Engine ${{ steps.version.outputs.tag }}
          files: artifacts/release/*
          prerelease: ${{ inputs.prerelease == true }}
          draft: ${{ inputs.draft == true }}
          generate_release_notes: true

# =====================================================================
# JOB 2: TELEGRAM NOTIFICATION (Release Version)
# =====================================================================
  telegram-notify-release:
    name: 📢 Send Release Alert
    needs: [release-production]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - shell: bash
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_ID }}
          REL_STATUS: ${{ needs.release-production.result }}
        run: |
          if [ -z "$BOT_TOKEN" ] || [ -z "$CHAT_ID" ]; then exit 0; fi
          function get_icon { case $1 in success) echo "🎉" ;; failure) echo "🛑" ;; cancelled) echo "⚠️" ;; *) echo "❓" ;; esac }
          MSG=$(cat <<EOF
          📦 <b>NTE - Production Release Pipeline</b>

          <b>Version Trigger:</b> <code>${{ github.ref_name }}</code>
          <b>Triggered By:</b> <code>${{ github.actor }}</code>

          <b>Deployment Status:</b> $(get_icon "$REL_STATUS") <b>$REL_STATUS</b>

          🔗 <a href="${{ github.server_url }}/${{ github.repository }}/releases">View Published Releases</a>
          EOF
          )
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" -d "chat_id=${CHAT_ID}" -d "parse_mode=HTML" -d "disable_web_page_preview=true" --data-urlencode "text=$MSG"
