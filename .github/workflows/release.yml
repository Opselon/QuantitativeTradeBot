name: Nexus CI & Release Pipeline

# ----------------------------------------------------------
# Triggers
# ----------------------------------------------------------
on:
  push:
    branches:
      - main
      - develop
      - "feat/**"
      - "feature/**"
      - "fix/**"
      - "hotfix/**"
  pull_request:
    branches:
      - main
      - develop

  workflow_dispatch:
    inputs:
      version:
        description: "نسخه‌ی semantic بدون v (مثلاً 0.64.0)"
        required: true
        default: "0.64.0"
        type: string
      prerelease:
        description: "Release به صورت pre-release منتشر شود؟"
        required: true
        default: false
        type: boolean
      draft:
        description: "Release به صورت draft ایجاد شود؟"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: nexus-ci-release-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  NUGET_XMLDOC_MODE: skip

  BUILD_CONFIGURATION: Release

  SOLUTION_PATH: NexusTradingEngine.sln
  DESKTOP_PROJECT: src/Nexus.Desktop/Nexus.Desktop.csproj
  INFRASTRUCTURE_PROJECT: src/Nexus.Infrastructure/Nexus.Infrastructure.csproj

  PUBLISH_ROOT: ${{ github.workspace }}/artifacts/publish
  RELEASE_ROOT: ${{ github.workspace }}/artifacts/release
  MIGRATION_ROOT: ${{ github.workspace }}/artifacts/migrations

# ============================================================
# 1) CI – Ubuntu (.NET + Unit Tests + Native)
# ============================================================
jobs:
  ci:
    name: CI • Build & Unit Tests (.NET 10 + Native)
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------
      # Source & .NET
      # ------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          include-prerelease: true

      - name: Show .NET environment
        run: |
          echo "===[ .NET Environment ]=============================="
          dotnet --info

      # ------------------------------------------------------
      # Restore & Build
      # ------------------------------------------------------
      - name: Restore solution
        run: |
          echo "===[ Restore ]======================================="
          dotnet restore "${{ env.SOLUTION_PATH }}"

      - name: Build solution (CI)
        run: |
          echo "===[ Build ]========================================="
          dotnet build "${{ env.SOLUTION_PATH }}" \
            --configuration "${BUILD_CONFIGURATION}" \
            --no-restore

      # ------------------------------------------------------
      # Tests (بدون Docker / Integration / E2E)
      # ------------------------------------------------------
      - name: Run unit tests (no Docker)
        run: |
          echo "===[ Unit Tests ]===================================="
          dotnet test "${{ env.SOLUTION_PATH }}" \
            --configuration "${BUILD_CONFIGURATION}" \
            --no-build \
            --filter "TestCategory!=Docker&TestCategory!=Integration&TestCategory!=E2E" \
            --logger "trx;LogFileName=unit-tests.trx" \
            --results-directory "TestResults"

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: TestResults
          if-no-files-found: ignore

      # ------------------------------------------------------
      # Native component
      # ------------------------------------------------------
      - name: Build native C++ component
        run: |
          set -euo pipefail
          echo "===[ Native Build (Linux) ]=========================="

          if [ ! -f "native/build.sh" ]; then
            echo "::error::native/build.sh not found. Ensure native folder exists."
            exit 1
          fi

          chmod +x native/build.sh
          ./native/build.sh

          if ls native/Nexus.Native/nexus_native.* 1> /dev/null 2>&1; then
            echo "Native binaries:"
            ls -lah native/Nexus.Native/nexus_native.*
          else
            echo "::warning::Native build completed but no nexus_native.* found."
          fi

      # ------------------------------------------------------
      # CI Summary – UX خفن روی Ubuntu
      # ------------------------------------------------------
      - name: CI summary
        if: always()
        run: |
          cat << EOF >> "$GITHUB_STEP_SUMMARY"
          # Nexus CI Summary

          ## Environment
          - Runner    : ubuntu-latest
          - Config    : ${BUILD_CONFIGURATION}
          - Solution  : ${SOLUTION_PATH}

          ## Tests
          - Type      : Unit-only
          - Filter    : TestCategory!=Docker & TestCategory!=Integration & TestCategory!=E2E

          ## Native
          - Script    : native/build.sh
          - Output    : native/Nexus.Native/nexus_native.*

          EOF

      - name: Generate AI project structure document (CI)
        if: always()
        shell: bash
        env:
          FINAL_STATUS: ${{ job.status }}
          DOC_DIR: QuantitativeTradeBot/.nexus_docs
          OUTPUT_FILE: QuantitativeTradeBot/.nexus_docs/000_PROJECT_STRUCTURE.md
        run: |
          set -euo pipefail

          mkdir -p "$DOC_DIR"
          rm -f "$OUTPUT_FILE"

          if [ "$FINAL_STATUS" = "success" ]; then
            STATUS_ICON="✅"
            STATUS_TEXT="Successful CI run (build + tests + native)"
          else
            STATUS_ICON="❌"
            STATUS_TEXT="CI run failed"
          fi

          REPO_NAME="${GITHUB_REPOSITORY:-unknown}"
          BRANCH_NAME="${GITHUB_REF_NAME:-unknown}"
          COMMIT_SHA="${GITHUB_SHA:-unknown}"
          RUN_ID="${GITHUB_RUN_ID:-unknown}"
          RUN_NUMBER="${GITHUB_RUN_NUMBER:-unknown}"
          ACTOR="${GITHUB_ACTOR:-unknown}"
          NOW_UTC="$(date -u '+%Y-%m-%d %H:%M:%S')"

          cat << 'HEADER' > "$OUTPUT_FILE"
          # 14 – Nexus Project Structure (Latest Build)

          > این فایل به صورت خودکار توسط GitHub Actions ساخته می‌شود.  
          > در هر اجرای CI، محتوای قبلی پاک شده و با snapshot جدید جایگزین می‌شود.

          ## Build / Pipeline Result
          HEADER

          {
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Status | ${STATUS_ICON} ${STATUS_TEXT} |"
            echo "| Job | ci (.NET + Unit Tests + Native, Ubuntu) |"
            echo "| Repository | \`${REPO_NAME}\` |"
            echo "| Branch | \`${BRANCH_NAME}\` |"
            echo "| Commit | \`${COMMIT_SHA}\` |"
            echo "| Workflow Run ID | \`${RUN_ID}\` |"
            echo "| Workflow Run Number | \`${RUN_NUMBER}\` |"
            echo "| Triggered By | \`${ACTOR}\` |"
            echo "| Generated At (UTC) | \`${NOW_UTC}\` |"
            echo "| Output Path | \`${OUTPUT_FILE}\` |"
            echo
            echo "## Purpose"
            echo
            echo "این سند یک نمای AI-friendly از ساختار سورس کد است."
            echo "هدف: راه‌اندازی سریع Agent برای معماری، دیباگ، Refactor و تحلیل."
            echo
            echo "### Includes"
            echo "- Solutions/Projects: .sln, .csproj, .vcxproj, .props, .targets"
            echo "- Source: C#, C/C++, XAML, Razor"
            echo "- Config: JSON, YAML, XML, Dockerfile, GitHub Workflows"
            echo "- Scripts: .sh, .ps1, .cmd, .bat"
            echo "- Docs & SQL: .md, .sql"
            echo
            echo "### Excludes (noise reduction)"
            echo "- Directories: bin, obj, packages, node_modules, TestResults, coverage, publish, artifacts, .git"
            echo "- Binaries: *.dll, *.exe, *.pdb, *.so, *.dylib, *.nupkg"
            echo
            echo "## Agent Reading Guide"
            echo
            echo "1. از solution اصلی (مثلاً NexusTradingEngine.sln) شروع کن."
            echo "2. لایه‌ها را روی فولدرهای Domain / Application / Infrastructure / Desktop / Native / Tests ببین."
            echo "3. Configها، Dockerfileها و YAMLهای CI/CD را به‌عنوان behavior runtime و release در نظر بگیر."
            echo "4. این فایل نقشه است؛ برای تصمیم‌گیری نهایی همیشه خود سورس را بخوان."
          } >> "$OUTPUT_FILE"

          cat << 'TREE_HEADER' >> "$OUTPUT_FILE"

          ## High-Level Directory Tree (QuantitativeTradeBot)

          ```text
          TREE_HEADER

          if [ -d "QuantitativeTradeBot" ]; then
            find QuantitativeTradeBot \
              \( \
                -path '*/.git' -o \
                -path '*/bin' -o \
                -path '*/obj' -o \
                -path '*/packages' -o \
                -path '*/node_modules' -o \
                -path '*/TestResults' -o \
                -path '*/coverage' -o \
                -path '*/publish' -o \
                -path '*/artifacts' \
              \) -prune -o \
              -type d \
              | sed 's#^QuantitativeTradeBot/##' \
              | sed 's#^QuantitativeTradeBot$#.#' \
              | sort >> "$OUTPUT_FILE"
          else
            echo "(QuantitativeTradeBot directory not found in repo root.)" >> "$OUTPUT_FILE"
          fi

          cat << 'TREE_FOOTER' >> "$OUTPUT_FILE"
          ```

          TREE_FOOTER

          cat << 'FILES_HEADER' >> "$OUTPUT_FILE"

          ## Important Files

          ```text
          FILES_HEADER

          if [ -d "QuantitativeTradeBot" ]; then
            find QuantitativeTradeBot \
              \( \
                -path '*/.git' -o \
                -path '*/bin' -o \
                -path '*/obj' -o \
                -path '*/packages' -o \
                -path '*/node_modules' -o \
                -path '*/TestResults' -o \
                -path '*/coverage' -o \
                -path '*/publish' -o \
                -path '*/artifacts' \
              \) -prune -o \
              -type f \
              \( \
                -name '*.sln' -o \
                -name '*.csproj' -o \
                -name '*.vcxproj' -o \
                -name '*.props' -o \
                -name '*.targets' -o \
                -name '*.cs' -o \
                -name '*.fs' -o \
                -name '*.vb' -o \
                -name '*.xaml' -o \
                -name '*.razor' -o \
                -name '*.json' -o \
                -name '*.jsonc' -o \
                -name '*.xml' -o \
                -name '*.yml' -o \
                -name '*.yaml' -o \
                -name '*.md' -o \
                -name '*.sql' -o \
                -name '*.sh' -o \
                -name '*.ps1' -o \
                -name '*.cmd' -o \
                -name '*.bat' -o \
                -name '*.cpp' -o \
                -name '*.c' -o \
                -name '*.h' -o \
                -name '*.hpp' -o \
                -name '*.natvis' -o \
                -name '.editorconfig' -o \
                -name 'Dockerfile' -o \
                -name '.dockerignore' -o \
                -name '.gitignore' -o \
                -name 'Directory.Build.props' -o \
                -name 'Directory.Build.targets' -o \
                -name 'Directory.Packages.props' -o \
                -name 'NuGet.config' \
              \) \
              ! -name '*.dll' \
              ! -name '*.exe' \
              ! -name '*.pdb' \
              ! -name '*.so' \
              ! -name '*.dylib' \
              ! -name '*.nupkg' \
              | sed 's#^QuantitativeTradeBot/##' \
              | sort >> "$OUTPUT_FILE"
          else
            echo "(QuantitativeTradeBot directory not found in repo root.)" >> "$OUTPUT_FILE"
          fi

          cat << 'FILES_FOOTER' >> "$OUTPUT_FILE"
          ```

          FILES_FOOTER

          cat << 'COUNTS_HEADER' >> "$OUTPUT_FILE"

          ## Source File Counts

          COUNTS_HEADER

          if [ -d "QuantitativeTradeBot" ]; then
            CS_COUNT=$(find QuantitativeTradeBot \( -path '*/bin' -o -path '*/obj' -o -path '*/.git' \) -prune -o -type f -name '*.cs' | wc -l || echo 0)
            XAML_COUNT=$(find QuantitativeTradeBot \( -path '*/bin' -o -path '*/obj' -o -path '*/.git' \) -prune -o -type f -name '*.xaml' | wc -l || echo 0)
            CPP_COUNT=$(find QuantitativeTradeBot \( -path '*/bin' -o -path '*/obj' -o -path '*/.git' \) -prune -o -type f \( -name '*.c' -o -name '*.cpp' -o -name '*.h' -o -name '*.hpp' \) | wc -l || echo 0)
            PROJ_COUNT=$(find QuantitativeTradeBot \( -path '*/bin' -o -path '*/obj' -o -path '*/.git' \) -prune -o -type f \( -name '*.csproj' -o -name '*.vcxproj' -o -name '*.sln' \) | wc -l || echo 0)
            MD_COUNT=$(find QuantitativeTradeBot \( -path '*/bin' -o -path '*/obj' -o -path '*/.git' \) -prune -o -type f -name '*.md' | wc -l || echo 0)
            SQL_COUNT=$(find QuantitativeTradeBot \( -path '*/bin' -o -path '*/obj' -o -path '*/.git' \) -prune -o -type f -name '*.sql' | wc -l || echo 0)
            YAML_COUNT=$(find QuantitativeTradeBot \( -path '*/bin' -o -path '*/obj' -o -path '*/.git' \) -prune -o -type f \( -name '*.yml' -o -name '*.yaml' \) | wc -l || echo 0)

            {
              echo "| Type | Count |"
              echo "| --- | ---: |"
              echo "| C# files | ${CS_COUNT} |"
              echo "| XAML files | ${XAML_COUNT} |"
              echo "| C/C++ source files | ${CPP_COUNT} |"
              echo "| Project files | ${PROJ_COUNT} |"
              echo "| Markdown docs | ${MD_COUNT} |"
              echo "| SQL files | ${SQL_COUNT} |"
              echo "| YAML files | ${YAML_COUNT} |"
            } >> "$OUTPUT_FILE"
          else
            echo "(No counts – QuantitativeTradeBot directory not found.)" >> "$OUTPUT_FILE"
          fi

          {
            echo
            echo "## Final Result"
            echo
            echo "${STATUS_ICON} ${STATUS_TEXT}"
          } >> "$OUTPUT_FILE"

      - name: Upload AI project structure document
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-project-structure
          path: QuantitativeTradeBot/.nexus_docs/000_PROJECT_STRUCTURE.md
          if-no-files-found: ignore

  # ============================================================
  # 2) Release – Windows (.NET + Native + EF Bundle + ZIP + GH Release)
  # ============================================================
  release:
    name: Release • Windows Packaging & GitHub Release
    runs-on: windows-latest
    timeout-minutes: 60

    # مهم: همیشه اجرا شود، حتی اگر CI fail شود
    needs: ci
    if: always()

    defaults:
      run:
        shell: pwsh

    steps:
      # ------------------------------------------------------
      # Source
      # ------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ------------------------------------------------------
      # Version & Tag
      # ------------------------------------------------------
      - name: Determine release version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          $ErrorActionPreference = "Stop"

          Write-Host "===[ Versioning ]==================================="

          if ($env:EVENT_NAME -eq "workflow_dispatch") {
              $version = $env:INPUT_VERSION.Trim()
              if (-not $version) {
                  throw "workflow_dispatch: version input is empty."
              }
          }
          else {
              # ساده: نسخه‌ی base + شماره‌ی run
              $baseVersion = "0.64"
              $version = "$baseVersion.$env:RUN_NUMBER"
          }

          if ($version -notmatch '^\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?$') {
              throw "Invalid version '$version'. Expected semantic version like 0.64.0."
          }

          $numericVersion = ($version -split '-')[0]
          $tag = "v$version"
          $releaseName = "Nexus Trading Engine v$version"

          "version=$version" >> $env:GITHUB_OUTPUT
          "numeric_version=$numericVersion" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "release_name=$releaseName" >> $env:GITHUB_OUTPUT

          Write-Host "Version       : $version"
          Write-Host "NumericVersion: $numericVersion"
          Write-Host "Tag           : $tag"
          Write-Host "Release name  : $releaseName"

      # ------------------------------------------------------
      # .NET SDK
      # ------------------------------------------------------
      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          include-prerelease: true

      - name: Display .NET info
        run: |
          $ErrorActionPreference = "Stop"
          Write-Host "===[ .NET Environment ]============================="
          dotnet --info
          dotnet --list-sdks
          dotnet --list-runtimes

      # ------------------------------------------------------
      # Prepare directories
      # ------------------------------------------------------
      - name: Prepare artifact directories
        run: |
          $ErrorActionPreference = "Stop"
          Write-Host "===[ Prepare Artifacts ]============================"

          $paths = @(
              "${{ env.PUBLISH_ROOT }}",
              "${{ env.PUBLISH_ROOT }}/win-x64-self-contained",
              "${{ env.PUBLISH_ROOT }}/win-x64-framework-dependent",
              "${{ env.RELEASE_ROOT }}",
              "${{ env.MIGRATION_ROOT }}"
          )

          foreach ($path in $paths) {
              if (Test-Path $path) {
                  Remove-Item -Path $path -Recurse -Force
              }
              New-Item -ItemType Directory -Path $path -Force | Out-Null
              Write-Host "Prepared: $path"
          }

      # ------------------------------------------------------
      # Restore & Build & Tests (Release)
      # ------------------------------------------------------
      - name: Restore solution (Release)
        run: |
          $ErrorActionPreference = "Stop"
          Write-Host "===[ Restore ]======================================"
          dotnet restore "${{ env.SOLUTION_PATH }}"

      - name: Build solution (Release)
        run: |
          $ErrorActionPreference = "Stop"
          Write-Host "===[ Build ]========================================"

          dotnet build "${{ env.SOLUTION_PATH }}" `
            --configuration Release `
            --no-restore `
            -p:ContinuousIntegrationBuild=true `
            -p:Version="${{ steps.version.outputs.version }}" `
            -p:AssemblyVersion="${{ steps.version.outputs.numeric_version }}" `
            -p:FileVersion="${{ steps.version.outputs.numeric_version }}" `
            -p:InformationalVersion="${{ steps.version.outputs.version }}+${{ github.sha }}"

      - name: Run unit tests (Release, بدون Docker)
        run: |
          $ErrorActionPreference = "Stop"
          Write-Host "===[ Unit Tests ]==================================="

          dotnet test "${{ env.SOLUTION_PATH }}" `
            --configuration Release `
            --no-restore `
            --no-build `
            --filter "TestCategory!=Docker&TestCategory!=Integration&TestCategory!=E2E" `
            --logger "trx;LogFileName=unit-tests.trx" `
            --results-directory "${{ github.workspace }}/artifacts/test-results"

      # ------------------------------------------------------
      # Native Windows component
      # ------------------------------------------------------
      - name: Build native Windows component
        shell: bash
        run: |
          set -euo pipefail
          echo "===[ Native Build (Windows) ]======================="

          if [ ! -f "native/build.sh" ]; then
            echo "::error::native/build.sh not found."
            exit 1
          fi

          chmod +x native/build.sh
          ./native/build.sh

          DLL_PATH="native/Nexus.Native/nexus_native.dll"
          if [ ! -f "$DLL_PATH" ]; then
            echo "::error::Native build completed but $DLL_PATH not found."
            find native -maxdepth 4 -type f -print || true
            exit 1
          fi

          echo "Native DLL:"
          ls -lah "$DLL_PATH"

      # ------------------------------------------------------
      # EF migration bundle
      # ------------------------------------------------------
      - name: Install dotnet-ef CLI
        run: |
          $ErrorActionPreference = "Stop"
          Write-Host "===[ dotnet-ef Install ]============================"

          dotnet tool install dotnet-ef --global --version "9.0.2"
          dotnet-ef --version

      - name: Generate EF migration bundle (win-x64)
        run: |
          $ErrorActionPreference = "Stop"
          Write-Host "===[ EF Bundle ]===================================="

          $bundlePath = "${{ env.MIGRATION_ROOT }}/efbundle.exe"

          dotnet ef migrations bundle `
            --project "${{ env.INFRASTRUCTURE_PROJECT }}" `
            --startup-project "${{ env.INFRASTRUCTURE_PROJECT }}" `
            --configuration Release `
            --runtime win-x64 `
            --self-contained `
            --force `
            --output "$bundlePath"

          if (-not (Test-Path $bundlePath)) {
              throw "EF migration bundle not generated: $bundlePath"
          }

          $bundle = Get-Item $bundlePath
          if ($bundle.Length -le 0) {
              throw "EF migration bundle is empty."
          }

          Write-Host "Migration bundle: $($bundle.FullName)"
          Write-Host "Size           : $($bundle.Length) bytes"

      # ------------------------------------------------------
      # Publish Desktop – self-contained + framework-dependent
      # ------------------------------------------------------
      - name: Publish self-contained Windows x64
        run: |
          $ErrorActionPreference = "Stop"
          Write-Host "===[ Publish Self-contained ]======================="

          dotnet publish "${{ env.DESKTOP_PROJECT }}" `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --no-restore `
            -p:PublishSingleFile=false `
            -p:PublishReadyToRun=false `
            -p:PublishTrimmed=false `
            -p:DebugType=none `
            -p:DebugSymbols=false `
            -p:ContinuousIntegrationBuild=true `
            -p:Version="${{ steps.version.outputs.version }}" `
            -p:AssemblyVersion="${{ steps.version.outputs.numeric_version }}" `
            -p:FileVersion="${{ steps.version.outputs.numeric_version }}" `
            -p:InformationalVersion="${{ steps.version.outputs.version }}+${{ github.sha }}" `
            --output "${{ env.PUBLISH_ROOT }}/win-x64-self-contained"

      - name: Publish framework-dependent Windows x64
        run: |
          $ErrorActionPreference = "Stop"
          Write-Host "===[ Publish Framework-dependent ]=================="

          dotnet publish "${{ env.DESKTOP_PROJECT }}" `
            --configuration Release `
            --runtime win-x64 `
            --self-contained false `
            --no-restore `
            -p:PublishSingleFile=false `
            -p:PublishReadyToRun=false `
            -p:PublishTrimmed=false `
            -p:DebugType=none `
            -p:DebugSymbols=false `
            -p:ContinuousIntegrationBuild=true `
            -p:Version="${{ steps.version.outputs.version }}" `
            -p:AssemblyVersion="${{ steps.version.outputs.numeric_version }}" `
            -p:FileVersion="${{ steps.version.outputs.numeric_version }}" `
            -p:InformationalVersion="${{ steps.version.outputs.version }}+${{ github.sha }}" `
            --output "${{ env.PUBLISH_ROOT }}/win-x64-framework-dependent"

      # ------------------------------------------------------
      # Safe config + native + efbundle
      # ------------------------------------------------------
      - name: Add safe configuration and native files
        run: |
          $ErrorActionPreference = "Stop"
          Write-Host "===[ Safe Config & Native ]========================="

          $selfContained = "${{ env.PUBLISH_ROOT }}/win-x64-self-contained"
          $framework = "${{ env.PUBLISH_ROOT }}/win-x64-framework-dependent"
          $migrationBundle = "${{ env.MIGRATION_ROOT }}/efbundle.exe"
          $nativeDll = "${{ github.workspace }}/native/Nexus.Native/nexus_native.dll"

          $config = [ordered]@{
              SelectedProvider = "SQLite"
              ConnectionString = "Data Source=nexus.db"
              IsOnboarded = $false
              ProfileName = "LocalSimulation"
              BrokerServer = ""
              LoginAccountId = ""
              TerminalPath = ""
              TimeoutSeconds = 30
              AutoReconnect = $true
              Mt5Mode = "Simulated"
              Mt5BridgeHost = "127.0.0.1"
              Mt5BridgePort = 5000
              Mt5BridgeUseSsl = $false
          }

          $configJson = $config | ConvertTo-Json -Depth 10
          $configTemplate = $config | ConvertTo-Json -Depth 10

          $readme = @"
          Nexus Trading Engine ${{ steps.version.outputs.version }}
          =======================================================

          QUICK START
          -----------
          1. Run Nexus.Desktop.exe.
          2. Keep SQLite selected for local testing.
          3. Keep Mt5Mode = Simulated.
          4. MT5 is NOT required for simulated-mode testing.

          SECURITY
          --------
          - No passwords or secrets included.
          - Do NOT commit real credentials into nexus_config.json.
          "@

          foreach ($destination in @($selfContained, $framework)) {
              if (-not (Test-Path $destination)) {
                  throw "Publish output not found: $destination"
              }

              Set-Content -Path "$destination/nexus_config.json" -Value $configJson -Encoding UTF8
              Set-Content -Path "$destination/nexus_config.json.template" -Value $configTemplate -Encoding UTF8
              Set-Content -Path "$destination/README.txt" -Value $readme -Encoding UTF8

              Copy-Item $migrationBundle "$destination/efbundle.exe" -Force
              Copy-Item $nativeDll "$destination/nexus_native.dll" -Force
          }

      # ------------------------------------------------------
      # Validate release outputs
      # ------------------------------------------------------
      - name: Validate release outputs
        run: |
          $ErrorActionPreference = "Stop"
          Write-Host "===[ Validate Outputs ]=============================="

          $publishFolders = @(
              "${{ env.PUBLISH_ROOT }}/win-x64-self-contained",
              "${{ env.PUBLISH_ROOT }}/win-x64-framework-dependent"
          )

          $requiredFiles = @(
              "Nexus.Desktop.exe",
              "nexus_config.json",
              "nexus_config.json.template",
              "README.txt",
              "efbundle.exe",
              "nexus_native.dll"
          )

          foreach ($folder in $publishFolders) {
              Write-Host "Validating: $folder"

              foreach ($requiredFile in $requiredFiles) {
                  $path = Join-Path $folder $requiredFile

                  if (-not (Test-Path $path)) {
                      throw "Missing required file: $path"
                  }

                  $file = Get-Item $path
                  if ($file.Length -le 0) {
                      throw "Empty required file: $path"
                  }

                  Write-Host "  OK: $requiredFile ($($file.Length) bytes)"
              }
          }

          $forbiddenPatterns = @(
              '"Password"\s*:\s*"[^"]+"',
              '"Secret"\s*:\s*"[^"]+"',
              '"ApiKey"\s*:\s*"[^"]+"',
              '"LoginAccountId"\s*:\s*"[0-9]+"'
          )

          Get-ChildItem "${{ env.PUBLISH_ROOT }}" -Recurse -File -Include *.json,*.config,*.txt |
          ForEach-Object {
              $content = Get-Content $_.FullName -Raw
              foreach ($pattern in $forbiddenPatterns) {
                  if ($content -match $pattern) {
                      throw "Potential secret detected in: $($_.FullName)"
                  }
              }
          }

      # ------------------------------------------------------
      # ZIP packages
      # ------------------------------------------------------
      - name: Create release ZIP packages
        id: packages
        run: |
          $ErrorActionPreference = "Stop"
          Write-Host "===[ ZIP Packages ]================================="

          $version = "${{ steps.version.outputs.version }}"
          $releaseRoot = "${{ env.RELEASE_ROOT }}"

          $selfContainedZip = Join-Path $releaseRoot "Nexus.Desktop-win-x64-self-contained-$version.zip"
          $frameworkZip = Join-Path $releaseRoot "Nexus.Desktop-win-x64-framework-dependent-$version.zip"

          Compress-Archive -Path "${{ env.PUBLISH_ROOT }}/win-x64-self-contained/*" `
                           -DestinationPath $selfContainedZip `
                           -CompressionLevel Optimal `
                           -Force

          Compress-Archive -Path "${{ env.PUBLISH_ROOT }}/win-x64-framework-dependent/*" `
                           -DestinationPath $frameworkZip `
                           -CompressionLevel Optimal `
                           -Force

          Copy-Item "${{ env.MIGRATION_ROOT }}/efbundle.exe" `
                    "$releaseRoot/efbundle-win-x64-$version.exe" `
                    -Force

          $files = Get-ChildItem $releaseRoot -File
          foreach ($file in $files) {
              Write-Host "$($file.Name) - $($file.Length) bytes"
              if ($file.Length -le 0) {
                  throw "Empty asset: $($file.FullName)"
              }
          }

          "self_contained_zip=$selfContainedZip" >> $env:GITHUB_OUTPUT
          "framework_zip=$frameworkZip" >> $env:GITHUB_OUTPUT

      # ------------------------------------------------------
      # Release notes + Upload + GitHub Release
      # ------------------------------------------------------
      - name: Generate release notes
        run: |
          $ErrorActionPreference = "Stop"
          Write-Host "===[ Release Notes ]================================"

          $version = "${{ steps.version.outputs.version }}"
          $tag = "${{ steps.version.outputs.tag }}"

          $notes = @"
          # Nexus Trading Engine $version

          ## Assets
          - Nexus.Desktop-win-x64-self-contained-$version.zip
          - Nexus.Desktop-win-x64-framework-dependent-$version.zip
          - efbundle-win-x64-$version.exe

          ## Quick start
          1. Download self-contained ZIP.
          2. Extract.
          3. Run Nexus.Desktop.exe.
          4. Use SQLite + Simulated MT5 (no real credentials).

          ## Build metadata
          - Version: $version
          - Tag: $tag
          - Commit: ${{ github.sha }}
          "@

          Set-Content -Path "${{ github.workspace }}/release_notes.md" -Value $notes -Encoding UTF8

      - name: Upload release artifacts to workflow
        uses: actions/upload-artifact@v4
        with:
          name: nexus-release-${{ steps.version.outputs.version }}
          path: artifacts/release/*
          if-no-files-found: error
          retention-days: 30

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.version.outputs.release_name }}
          body_path: release_notes.md
          draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          generate_release_notes: false
          fail_on_unmatched_files: true
          overwrite_files: true
          files: |
            artifacts/release/Nexus.Desktop-win-x64-self-contained-${{ steps.version.outputs.version }}.zip
            artifacts/release/Nexus.Desktop-win-x64-framework-dependent-${{ steps.version.outputs.version }}.zip
            artifacts/release/efbundle-win-x64-${{ steps.version.outputs.version }}.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Pipeline summary
        run: |
          @"
          # Nexus CI & Release Summary

          ## CI (Ubuntu)
          - Build    : ${BUILD_CONFIGURATION}
          - Tests    : Unit-only (no Docker / Integration / E2E)

          ## Release (Windows)
          - Version       : `${{ steps.version.outputs.version }}`
          - Tag           : `${{ steps.version.outputs.tag }}`
          - Self-contained: `Nexus.Desktop-win-x64-self-contained-${{ steps.version.outputs.version }}.zip`
          - Framework     : `Nexus.Desktop-win-x64-framework-dependent-${{ steps.version.outputs.version }}.zip`
          - efbundle      : `efbundle-win-x64-${{ steps.version.outputs.version }}.exe`

          ## Note
          - Release job runs regardless of CI result (needs: ci + if: always()).
          "@ >> $env:GITHUB_STEP_SUMMARY
