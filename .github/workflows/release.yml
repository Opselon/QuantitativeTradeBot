name: Nexus CI & Release Pipeline

on:
  # --- CI: اجرای خودکار روی شاخه‌ها و فیچرها ---
  push:
    branches:
      - main
      - develop
      - "feat/**"
      - "feature/**"
      - "fix/**"
      - "hotfix/**"
  pull_request:
    branches:
      - main
      - develop

  # --- Release: اجرای دستی با ورژن دلخواه ---
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version بدون v، مثلا 0.64.0"
        required: true
        default: "0.64.0"
        type: string
      prerelease:
        description: "Release به صورت pre-release منتشر شود؟"
        required: true
        default: false
        type: boolean
      draft:
        description: "Release به صورت draft ایجاد شود؟"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: nexus-ci-release-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  NUGET_XMLDOC_MODE: skip
  BUILD_CONFIGURATION: Release

  SOLUTION_PATH: NexusTradingEngine.sln
  DESKTOP_PROJECT: src/Nexus.Desktop/Nexus.Desktop.csproj
  INFRASTRUCTURE_PROJECT: src/Nexus.Infrastructure/Nexus.Infrastructure.csproj

  PUBLISH_ROOT: ${{ github.workspace }}/artifacts/publish
  RELEASE_ROOT: ${{ github.workspace }}/artifacts/release
  MIGRATION_ROOT: ${{ github.workspace }}/artifacts/migrations

jobs:
  # ============================================================
  # 1) CI Job – Cross-platform build, test, native
  # ============================================================
  ci:
    name: CI Build & Test (.NET 10 + Native)
    runs-on: ubuntu-latest

    steps:
      # --- Source ---
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- .NET ---
      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          include-prerelease: true

      - name: Show .NET environment
        run: dotnet --info

      # --- Cache NuGet ---
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.props', '**/*.targets', '**/packages.lock.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      # --- Native C++ ---
      - name: Build native C++ component
        run: |
          set -euo pipefail
          if [ ! -f "native/build.sh" ]; then
            echo "::error::native/build.sh not found. Ensure native folder exists."
            exit 1
          fi
          chmod +x native/build.sh
          ./native/build.sh

      # --- Restore ---
      - name: Restore solution
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      # --- Build (CI) ---
      - name: Build solution (CI)
        run: dotnet build ${{ env.SOLUTION_PATH }} \
          --configuration $BUILD_CONFIGURATION \
          --no-restore

      # --- Test ---
      - name: Test solution
        run: >
          dotnet test ${{ env.SOLUTION_PATH }}
          --configuration $BUILD_CONFIGURATION
          --no-build
          --logger "trx;LogFileName=test-results.trx"
          --results-directory TestResults

      # --- Test artifacts ---
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults
          if-no-files-found: ignore

  # ============================================================
  # 2) Release Job – فقط روی main + workflow_dispatch
  # ============================================================
  release:
    name: Windows Release & GitHub Release
    runs-on: windows-latest
    timeout-minutes: 60

    needs: ci

    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/main'))

    defaults:
      run:
        shell: pwsh

    steps:
      # ----------------------------------------------------------
      # Source
      # ----------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ----------------------------------------------------------
      # Version & Tag
      # ----------------------------------------------------------
      - name: Determine release version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          $ErrorActionPreference = "Stop"

          if ($env:EVENT_NAME -eq "workflow_dispatch") {
              $version = $env:INPUT_VERSION.Trim()
              $releaseTag = "v$version"
          }
          else {
              # Push روی main → نسخه یکتا بر اساس run_number
              $baseVersion = "0.64"
              $version = "$baseVersion.$env:RUN_NUMBER"
              $releaseTag = "v$version"
          }

          if ($version -notmatch '^\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?$') {
              throw "Invalid version '$version'. Expected semantic version like 0.64.0."
          }

          $numericVersion = ($version -split '-')[0]
          $releaseName = "Nexus Trading Engine v$version"

          "version=$version" >> $env:GITHUB_OUTPUT
          "numeric_version=$numericVersion" >> $env:GITHUB_OUTPUT
          "tag=$releaseTag" >> $env:GITHUB_OUTPUT
          "release_name=$releaseName" >> $env:GITHUB_OUTPUT

          Write-Host "Version       : $version"
          Write-Host "NumericVersion: $numericVersion"
          Write-Host "Tag           : $releaseTag"
          Write-Host "Release name  : $releaseName"

      # ----------------------------------------------------------
      # .NET SDK
      # ----------------------------------------------------------
      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          include-prerelease: true
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/packages.lock.json
            global.json
            NuGet.config

      - name: Display .NET info
        run: |
          $ErrorActionPreference = "Stop"
          dotnet --info
          dotnet --list-sdks
          dotnet --list-runtimes

      # ----------------------------------------------------------
      # Prepare directories
      # ----------------------------------------------------------
      - name: Prepare artifact directories
        run: |
          $ErrorActionPreference = "Stop"

          $paths = @(
              "${{ env.PUBLISH_ROOT }}",
              "${{ env.PUBLISH_ROOT }}/win-x64-self-contained",
              "${{ env.PUBLISH_ROOT }}/win-x64-framework-dependent",
              "${{ env.RELEASE_ROOT }}",
              "${{ env.MIGRATION_ROOT }}"
          )

          foreach ($path in $paths) {
              if (Test-Path $path) {
                  Remove-Item -Path $path -Recurse -Force
              }
              New-Item -ItemType Directory -Path $path -Force | Out-Null
          }

      # ----------------------------------------------------------
      # Restore & Build & Test (Release build)
      # ----------------------------------------------------------
      - name: Restore solution (Release)
        run: |
          $ErrorActionPreference = "Stop"
          dotnet restore "${{ env.SOLUTION_PATH }}"

      - name: Build solution (Release)
        run: |
          $ErrorActionPreference = "Stop"

          dotnet build "${{ env.SOLUTION_PATH }}" `
            --configuration Release `
            --no-restore `
            -p:ContinuousIntegrationBuild=true `
            -p:Version="${{ steps.version.outputs.version }}" `
            -p:AssemblyVersion="${{ steps.version.outputs.numeric_version }}" `
            -p:FileVersion="${{ steps.version.outputs.numeric_version }}" `
            -p:InformationalVersion="${{ steps.version.outputs.version }}+${{ github.sha }}"

      - name: Run tests (Release)
        run: |
          $ErrorActionPreference = "Stop"

          dotnet test "${{ env.SOLUTION_PATH }}" `
            --configuration Release `
            --no-restore `
            --no-build `
            --logger "trx;LogFileName=test-results.trx" `
            --results-directory "${{ github.workspace }}/artifacts/test-results"

      # ----------------------------------------------------------
      # Native Windows component
      # ----------------------------------------------------------
      - name: Verify native build script
        run: |
          $ErrorActionPreference = "Stop"

          if (-not (Test-Path "native/build.sh")) {
              throw "native/build.sh not found. Ensure native component exists."
          }

          $bashCommand = Get-Command bash -ErrorAction SilentlyContinue
          if ($null -eq $bashCommand) {
              throw "Bash is unavailable on Windows runner."
          }

          Write-Host "Bash at: $($bashCommand.Source)"

      - name: Build native Windows component
        shell: bash
        run: |
          set -euo pipefail
          echo "Building native Windows component..."
          chmod +x native/build.sh
          ./native/build.sh

          DLL_PATH="native/Nexus.Native/nexus_native.dll"
          if [ ! -f "$DLL_PATH" ]; then
            echo "::error::Native build completed but $DLL_PATH not found."
            find native -maxdepth 4 -type f -print || true
            exit 1
          fi

          ls -lah "$DLL_PATH"

      # ----------------------------------------------------------
      # EF Core migration bundle
      # ----------------------------------------------------------
      - name: Install dotnet-ef CLI
        run: |
          $ErrorActionPreference = "Stop"

          $toolPath = "${{ github.workspace }}/.tools"
          New-Item -ItemType Directory -Path $toolPath -Force | Out-Null

          dotnet tool install dotnet-ef `
            --tool-path $toolPath `
            --version "9.0.2"

          $toolPath >> $env:GITHUB_PATH
          & "$toolPath/dotnet-ef.exe" --version

      - name: Generate EF migration bundle (win-x64)
        run: |
          $ErrorActionPreference = "Stop"

          $bundlePath = "${{ env.MIGRATION_ROOT }}/efbundle.exe"

          dotnet ef migrations bundle `
            --project "${{ env.INFRASTRUCTURE_PROJECT }}" `
            --startup-project "${{ env.INFRASTRUCTURE_PROJECT }}" `
            --configuration Release `
            --runtime win-x64 `
            --self-contained `
            --force `
            --output "$bundlePath"

          if (-not (Test-Path $bundlePath)) {
              throw "EF migration bundle not generated: $bundlePath"
          }

          $bundle = Get-Item $bundlePath
          if ($bundle.Length -le 0) {
              throw "EF migration bundle is empty."
          }

          Write-Host "Migration bundle: $($bundle.FullName)"
          Write-Host "Size           : $($bundle.Length) bytes"

      # ----------------------------------------------------------
      # Publish Desktop – self-contained + framework-dependent
      # ----------------------------------------------------------
      - name: Publish self-contained Windows x64
        run: |
          $ErrorActionPreference = "Stop"

          dotnet publish "${{ env.DESKTOP_PROJECT }}" `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --no-restore `
            -p:PublishSingleFile=false `
            -p:PublishReadyToRun=false `
            -p:PublishTrimmed=false `
            -p:DebugType=none `
            -p:DebugSymbols=false `
            -p:ContinuousIntegrationBuild=true `
            -p:Version="${{ steps.version.outputs.version }}" `
            -p:AssemblyVersion="${{ steps.version.outputs.numeric_version }}" `
            -p:FileVersion="${{ steps.version.outputs.numeric_version }}" `
            -p:InformationalVersion="${{ steps.version.outputs.version }}+${{ github.sha }}" `
            --output "${{ env.PUBLISH_ROOT }}/win-x64-self-contained"

      - name: Publish framework-dependent Windows x64
        run: |
          $ErrorActionPreference = "Stop"

          dotnet publish "${{ env.DESKTOP_PROJECT }}" `
            --configuration Release `
            --runtime win-x64 `
            --self-contained false `
            --no-restore `
            -p:PublishSingleFile=false `
            -p:PublishReadyToRun=false `
            -p:PublishTrimmed=false `
            -p:DebugType=none `
            -p:DebugSymbols=false `
            -p:ContinuousIntegrationBuild=true `
            -p:Version="${{ steps.version.outputs.version }}" `
            -p:AssemblyVersion="${{ steps.version.outputs.numeric_version }}" `
            -p:FileVersion="${{ steps.version.outputs.numeric_version }}" `
            -p:InformationalVersion="${{ steps.version.outputs.version }}+${{ github.sha }}" `
            --output "${{ env.PUBLISH_ROOT }}/win-x64-framework-dependent"

      # ----------------------------------------------------------
      # Safe config + native + efbundle
      # ----------------------------------------------------------
      - name: Add safe configuration and native files
        run: |
          $ErrorActionPreference = "Stop"

          $selfContained = "${{ env.PUBLISH_ROOT }}/win-x64-self-contained"
          $framework = "${{ env.PUBLISH_ROOT }}/win-x64-framework-dependent"
          $migrationBundle = "${{ env.MIGRATION_ROOT }}/efbundle.exe"
          $nativeDll = "${{ github.workspace }}/native/Nexus.Native/nexus_native.dll"

          $config = [ordered]@{
              SelectedProvider = "SQLite"
              ConnectionString = "Data Source=nexus.db"
              IsOnboarded = $false
              ProfileName = "LocalSimulation"
              BrokerServer = ""
              LoginAccountId = ""
              TerminalPath = ""
              TimeoutSeconds = 30
              AutoReconnect = $true
              Mt5Mode = "Simulated"
              Mt5BridgeHost = "127.0.0.1"
              Mt5BridgePort = 5000
              Mt5BridgeUseSsl = $false
          }

          $configJson = $config | ConvertTo-Json -Depth 10

          $configTemplate = $config | ConvertTo-Json -Depth 10

          $readme = @"
          Nexus Trading Engine ${{ steps.version.outputs.version }}
          =======================================================

          QUICK START
          -----------
          1. Run Nexus.Desktop.exe.
          2. Keep SQLite selected for local testing.
          3. Keep Mt5Mode = Simulated.
          4. MT5 is NOT required for simulated-mode testing.

          SECURITY
          --------
          - No passwords or secrets included.
          - Do NOT commit real credentials into nexus_config.json.
          "@

          foreach ($destination in @($selfContained, $framework)) {
              if (-not (Test-Path $destination)) {
                  throw "Publish output not found: $destination"
              }

              Set-Content -Path "$destination/nexus_config.json" -Value $configJson -Encoding UTF8
              Set-Content -Path "$destination/nexus_config.json.template" -Value $configTemplate -Encoding UTF8
              Set-Content -Path "$destination/README.txt" -Value $readme -Encoding UTF8

              Copy-Item $migrationBundle "$destination/efbundle.exe" -Force
              Copy-Item $nativeDll "$destination/nexus_native.dll" -Force
          }

      # ----------------------------------------------------------
      # Validate release packages
      # ----------------------------------------------------------
      - name: Validate release outputs
        run: |
          $ErrorActionPreference = "Stop"

          $publishFolders = @(
              "${{ env.PUBLISH_ROOT }}/win-x64-self-contained",
              "${{ env.PUBLISH_ROOT }}/win-x64-framework-dependent"
          )

          $requiredFiles = @(
              "Nexus.Desktop.exe",
              "nexus_config.json",
              "nexus_config.json.template",
              "README.txt",
              "efbundle.exe",
              "nexus_native.dll"
          )

          foreach ($folder in $publishFolders) {
              Write-Host "Validating: $folder"

              foreach ($requiredFile in $requiredFiles) {
                  $path = Join-Path $folder $requiredFile

                  if (-not (Test-Path $path)) {
                      throw "Missing required file: $path"
                  }

                  $file = Get-Item $path
                  if ($file.Length -le 0) {
                      throw "Empty required file: $path"
                  }

                  Write-Host "  OK: $requiredFile ($($file.Length) bytes)"
              }
          }

          $forbiddenPatterns = @(
              '"Password"\s*:\s*"[^"]+"',
              '"Secret"\s*:\s*"[^"]+"',
              '"ApiKey"\s*:\s*"[^"]+"',
              '"LoginAccountId"\s*:\s*"[0-9]+"'
          )

          Get-ChildItem "${{ env.PUBLISH_ROOT }}" -Recurse -File -Include *.json,*.config,*.txt |
          ForEach-Object {
              $content = Get-Content $_.FullName -Raw
              foreach ($pattern in $forbiddenPatterns) {
                  if ($content -match $pattern) {
                      throw "Potential secret detected in: $($_.FullName)"
                  }
              }
          }

      # ----------------------------------------------------------
      # Package ZIPs
      # ----------------------------------------------------------
      - name: Create release ZIP packages
        id: packages
        run: |
          $ErrorActionPreference = "Stop"

          $version = "${{ steps.version.outputs.version }}"
          $releaseRoot = "${{ env.RELEASE_ROOT }}"

          $selfContainedZip = Join-Path $releaseRoot "Nexus.Desktop-win-x64-self-contained-$version.zip"
          $frameworkZip = Join-Path $releaseRoot "Nexus.Desktop-win-x64-framework-dependent-$version.zip"

          Compress-Archive -Path "${{ env.PUBLISH_ROOT }}/win-x64-self-contained/*" `
                           -DestinationPath $selfContainedZip `
                           -CompressionLevel Optimal `
                           -Force

          Compress-Archive -Path "${{ env.PUBLISH_ROOT }}/win-x64-framework-dependent/*" `
                           -DestinationPath $frameworkZip `
                           -CompressionLevel Optimal `
                           -Force

          Copy-Item "${{ env.MIGRATION_ROOT }}/efbundle.exe" `
                    "$releaseRoot/efbundle-win-x64-$version.exe" `
                    -Force

          $files = Get-ChildItem $releaseRoot -File
          if ($files.Count -lt 3) {
              throw "Expected >= 3 release assets, found $($files.Count)."
          }

          foreach ($file in $files) {
              if ($file.Length -le 0) {
                  throw "Empty asset: $($file.FullName)"
              }
              Write-Host "$($file.Name) - $($file.Length) bytes"
          }

          "self_contained_zip=$selfContainedZip" >> $env:GITHUB_OUTPUT
          "framework_zip=$frameworkZip" >> $env:GITHUB_OUTPUT

      # ----------------------------------------------------------
      # Release notes
      # ----------------------------------------------------------
      - name: Generate release notes
        run: |
          $ErrorActionPreference = "Stop"

          $version = "${{ steps.version.outputs.version }}"
          $tag = "${{ steps.version.outputs.tag }}"
          $selfContainedName = "Nexus.Desktop-win-x64-self-contained-$version.zip"
          $frameworkName = "Nexus.Desktop-win-x64-framework-dependent-$version.zip"
          $migrationName = "efbundle-win-x64-$version.exe"

          $notes = @"
          # Nexus Trading Engine $version

          ## Assets
          - $selfContainedName (recommended for testers)
          - $frameworkName
          - $migrationName

          ## Quick start
          1. Download $selfContainedName
          2. Extract ZIP
          3. Run Nexus.Desktop.exe
          4. Use SQLite + Simulated MT5 (no real credentials)

          ## Build metadata
          - Version: $version
          - Tag: $tag
          - Commit: ${{
            github.sha
          }}
          "@

          Set-Content -Path "${{ github.workspace }}/release_notes.md" -Value $notes -Encoding UTF8

      # ----------------------------------------------------------
      # Upload artifacts & GitHub Release
      # ----------------------------------------------------------
      - name: Upload release artifacts to workflow
        uses: actions/upload-artifact@v4
        with:
          name: nexus-release-${{ steps.version.outputs.version }}
          path: artifacts/release/*
          if-no-files-found: error
          retention-days: 30

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.version.outputs.release_name }}
          body_path: release_notes.md
          draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          generate_release_notes: false
          fail_on_unmatched_files: true
          overwrite_files: true
          files: |
            artifacts/release/Nexus.Desktop-win-x64-self-contained-${{ steps.version.outputs.version }}.zip
            artifacts/release/Nexus.Desktop-win-x64-framework-dependent-${{ steps.version.outputs.version }}.zip
            artifacts/release/efbundle-win-x64-${{ steps.version.outputs.version }}.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Pipeline summary
        run: |
          @"
          # Nexus CI & Release completed

          - Version: `${{ steps.version.outputs.version }}`
          - Tag: `${{ steps.version.outputs.tag }}`
          - Commit: `${{ github.sha }}`
          - Self-contained: `Nexus.Desktop-win-x64-self-contained-${{ steps.version.outputs.version }}.zip`
          - Framework: `Nexus.Desktop-win-x64-framework-dependent-${{ steps.version.outputs.version }}.zip`
          - efbundle: `efbundle-win-x64-${{ steps.version.outputs.version }}.exe`
          "@ >> $env:GITHUB_STEP_SUMMARY
